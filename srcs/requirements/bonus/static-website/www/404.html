<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #111827;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #38bdf8;
        }

        p {
            font-size: 18px;
            margin: 10px 0 20px;
        }

        a {
            display: inline-block;
            padding: 10px 20px;
            background: #1f2937;
            color: #e2e8f0;
            text-decoration: none;
            border-radius: 8px;
        }

        a:hover {
            background: #38bdf8;
            color: #0f172a;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>404</h1>
    <p>Oops! The page you are looking for does not exist.</p>
    <a href="/">Go Home</a>
</div>

</body>
</html>
