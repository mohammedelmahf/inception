
# Minimal FTP server config for Alpine Linux
listen=YES
listen_ipv6=NO
background=NO

# Local users
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

# Chroot
chroot_local_user=YES
allow_writeable_chroot=YES
secure_chroot_dir=/var/run/vsftpd

# User list
userlist_enable=YES
userlist_file=/etc/vsftpd/userlist
userlist_deny=NO

# Passive mode
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110

# Logging
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log

# PAM service name (needed for Alpine)
pam_service_name=vsftpd